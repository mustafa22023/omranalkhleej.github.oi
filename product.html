<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تفاصيل المنتج - شركة عمران الخليج</title>
  <link rel="stylesheet" href="styles.css?v=20260221-4" />
  <style>
    .product-page {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .product-detail {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .product-detail__img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: #f3f6fa center/cover no-repeat;
    }
    .product-detail__title {
      margin: 0 0 10px;
      font-size: clamp(1.4rem, 3.2vw, 2rem);
    }
    .product-detail__meta {
      margin: 0 0 12px;
      color: #4d5b6d;
      font-weight: 700;
    }
    .product-detail__price {
      margin: 0 0 18px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--brand-dark);
    }
    .product-detail__actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .product-detail__actions .btn {
      min-width: 150px;
      text-align: center;
    }
    .product-detail__notice {
      margin-top: 14px;
      color: #5b697a;
      font-size: 0.95rem;
    }
    @media (max-width: 820px) {
      .product-detail {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <div class="header__actions">
        <button class="icon icon--only theme-toggle" aria-label="تبديل الوضع">🌓</button>
      </div>
      <form class="search" role="search">
        <span class="search__icon">⌕</span>
        <input type="search" placeholder="ابحث عن منتج" aria-label="بحث" />
      </form>
      <div class="logo">
        <img src="logo.png" alt="شعار شركة عمران الخليج" />
        <div class="logo__text">
          <div class="logo__title">شركة عمران الخليج</div>
          <div class="logo__subtitle">لتوريد مواد البناء</div>
        </div>
      </div>
    </div>
  </header>

  <main class="product-page">
    <a class="btn btn--outline" href="index.html">رجوع للمتجر</a>
    <section class="product-detail">
      <div class="product-detail__img" id="product-image"></div>
      <div>
        <h1 class="product-detail__title" id="product-name">منتج</h1>
        <p class="product-detail__meta">التقييم: <span id="product-rating">4.8</span> / 5</p>
        <p class="product-detail__price">السعر: <span id="product-price">السعر حسب الكمية</span></p>
        <div class="product-detail__actions">
          <button id="add-to-cart" class="btn" type="button">اضف لعربة التسوق</button>
          <button id="buy-now" class="btn" type="button">اشتري الان</button>
        </div>
        <p class="product-detail__notice" id="cart-count"></p>
      </div>
    </section>
  </main>

  <script src="product.js?v=20260221-4"></script>
</body>
</html>
